name: CI

permissions:
  actions: read
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

env:
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  CI: 1
  RUSTUP_MAX_RETRIES: 10
  RUST_BACKTRACE: short

jobs:
  # Disabled until the crate is published to crates.io for the first time.
  # cargo-semver-checks needs a baseline version to compare against.
  # Re-enable after initial `cargo publish`.
  #
  # semver-checks:
  #   name: Semver Checks
  #   runs-on: ubuntu-24.04
  #   steps:
  #   - uses: actions/checkout@v6
  #   - uses: obi1kenobi/cargo-semver-checks-action@v2

  build-test:
    name: Build+Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 20
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install just
        uses: extractions/setup-just@v4
      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2
      - name: CI (check + test)
        run: just ci

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Determine MSRV from Cargo.toml
        id: msrv
        run: |
          msrv=$(sed -n 's/^rust-version *= *"\(.*\)"/\1/p' Cargo.toml)
          if [ -z "$msrv" ]; then
            echo "::error::rust-version not found in Cargo.toml"
            exit 1
          fi
          echo "version=$msrv" >> "$GITHUB_OUTPUT"
      - name: Install MSRV toolchain (${{ steps.msrv.outputs.version }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2
      # Only build the library itself at MSRV — dev-dependencies may
      # legitimately require a newer Rust version.
      - name: Build (MSRV)
        run: cargo build --lib
      - name: Check (no-std, MSRV)
        run: cargo check --lib --no-default-features

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        # Pin to 0.13.1 without --locked so cargo resolves fresh deps; the
        # published lockfile pins rustix 0.36 which fails with nightly ≥ 1.97
        # (rustc_layout_scalar_valid_range_* attributes now reserved for rustc).
        run: cargo install cargo-fuzz@0.13.1
      - name: Install just
        uses: extractions/setup-just@v4
      - name: Cache Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz
      - name: Generate seed corpus
        run: just generate-corpus
      - name: Fuzz all targets (2 minutes each)
        run: just fuzz-all
      - name: Upload fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-artifacts
          path: |
            fuzz/artifacts/
            target/fuzz-logs/

  # Sentinel job for required checks - configure this job name in repository settings.
  # Accepts 'skipped' as success so that merge_group-only jobs don't block PRs.
  required-checks:
    if: always()
    needs: [build-test, msrv, fuzz]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        env:
          NEEDS: ${{ toJson(needs) }}
        run: |
          FAILED=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result | IN("success","skipped") | not) | .key')
          if [ -n "$FAILED" ]; then
            echo "The following jobs did not succeed: $FAILED"
            exit 1
          fi
          echo "All jobs succeeded or were skipped."
